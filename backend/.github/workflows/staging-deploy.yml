name: Deploy to Staging

on:
  push:
    branches: [dev]

jobs:
  deploy-staging:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:staging

      - name: Deploy to staging server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /app/thunder-erp
            docker pull ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:staging
            echo "DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_EXPIRES_IN=24h" >> .env
            echo "NODE_ENV=production" >> .env
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            docker exec thunder-backend npx prisma migrate deploy

      - name: Smoke test
        run: |
          sleep 20
          curl -f ${{ secrets.STAGING_URL }}/api/health || exit 1

      - name: Notify Slack — staging deployed
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Staging deploy: ${{ job.status }} | Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
