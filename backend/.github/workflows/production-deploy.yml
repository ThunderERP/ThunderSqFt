name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    name: Build, Tag & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:v${{ steps.version.outputs.VERSION }}

      - name: Deploy to production server (zero-downtime)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /app/thunder-erp
            docker pull ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:v${{ steps.version.outputs.VERSION }}
            echo "DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_EXPIRES_IN=24h" >> .env
            echo "NODE_ENV=production" >> .env
            # Run migrations before swapping containers
            docker run --rm --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:v${{ steps.version.outputs.VERSION }} \
              npx prisma migrate deploy
            # Rolling restart
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale backend=2 backend
            sleep 15
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale backend=1 backend

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack — production deployed
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "🚀 Production deploy v${{ steps.version.outputs.VERSION }}: ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
