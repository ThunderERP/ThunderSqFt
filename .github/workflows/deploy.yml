name: Deploy

on:
  push:
    branches: [dev, main]

jobs:
  deploy-backend-staging:
    name: Backend → Staging
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push staging image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:staging

      - name: Deploy to staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /app/thunder-erp
            docker pull ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:staging
            echo "DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "NODE_ENV=production" >> .env
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            docker exec thunder-backend npx prisma migrate deploy

      - name: Smoke test
        run: sleep 20 && curl -f ${{ secrets.STAGING_URL }}/api/health

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Staging deploy: ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  deploy-backend-production:
    name: Backend → Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push production image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:v${{ steps.version.outputs.VERSION }}

      - name: Deploy to production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /app/thunder-erp
            docker pull ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:v${{ steps.version.outputs.VERSION }}
            echo "DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "NODE_ENV=production" >> .env
            docker run --rm --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/thunder-erp-backend:v${{ steps.version.outputs.VERSION }} \
              npx prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale backend=2 backend
            sleep 15
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale backend=1 backend

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

     